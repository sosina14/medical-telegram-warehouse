version: 2
models:
  - name: stg_telegram_messages
    description: "Cleaned and standardised Telegram messages."
    columns:
      - name: message_id
        description: "Unique Telegram message ID."
        tests: [not_null, unique]
      - name: channel_name
        description: "Lowercased channel name."
        tests: [not_null]
      - name: message_date
        description: "UTC timestamp of message."
        tests: [not_null]
      - name: view_count
        description: "Total views, coalesced to 0 if null."
      - name: has_image
        description: "True if image was downloaded."
